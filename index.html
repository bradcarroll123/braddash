<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brad's R365 Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f1;--surface:#fff;--s2:#f0ede8;--s3:#e8e4dd;--border:#e2ddd6;--border2:#cdc8c0;--text:#1a1814;--t2:#6b6560;--t3:#a09b95;--red:#c8392b;--green:#166534;--gbg:#dcfce7;--ybg:#fef9c3;--ytext:#854d0e;--rbg:#fee2e2;--rtext:#991b1b;--blue:#1e40af;--bbg:#dbeafe;--purple:#5b21b6;--pbg:#ede9fe;--orange:#c2410c;--obg:#ffedd5;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
.hdr{background:var(--text);color:#fff;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:52px}
.hdr-l{display:flex;align-items:center;gap:12px}
.logo{font-size:14px;font-weight:600;letter-spacing:-.3px;color:#fff}
.logo em{color:var(--red);font-style:normal}
.hpill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:2px 9px;font-size:10px;color:rgba(255,255,255,.65);font-weight:500}
.hdr-r{font-size:10px;color:rgba(255,255,255,.4);font-family:'DM Mono',monospace}
.alert-bar{background:#fff3cd;border-bottom:1px solid #fde68a;padding:8px 28px;display:flex;align-items:center;gap:10px;font-size:12px;color:#78350f;font-weight:500}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--border);background:var(--surface)}
.metric{padding:16px 20px;border-right:1px solid var(--border)}
.metric:last-child{border-right:none}
.metric .lbl{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.metric .val{font-size:22px;font-weight:300;color:var(--text);letter-spacing:-1px;font-family:'DM Mono',monospace;line-height:1}
.metric .val.red{color:var(--red)}
.metric .val.amber{color:var(--orange)}
.metric .sub{font-size:10px;color:var(--t3);margin-top:3px}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;flex-wrap:wrap}
.tabs-row{display:flex;align-items:center;gap:0}
.tab{padding:13px 16px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--red);font-weight:600}
.tab .cnt{background:var(--s2);color:var(--t2);font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.tab.active .cnt{background:var(--red);color:#fff}
.tsep{flex:1}
.tcontrols{display:flex;gap:6px;padding:8px 0;flex-wrap:wrap}
.ctrl{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
.ctrl:focus{border-color:var(--border2)}
input.ctrl{width:180px}
input.ctrl::placeholder{color:var(--t3)}
.twrap{overflow-x:auto;background:var(--surface)}
table{width:100%;border-collapse:collapse;min-width:1000px}
thead th{background:var(--surface);color:var(--t3);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.7px;padding:9px 14px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .08s}
tbody tr:hover{background:var(--s2)}
tbody tr.row-soon{border-left:3px solid var(--orange)}
tbody tr.row-closed{border-left:3px solid var(--s3)}
tbody td{padding:11px 14px;vertical-align:middle}
.aname{font-weight:600;font-size:13px;color:var(--text)}
.ameta{font-size:10px;color:var(--t3);margin-top:2px}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.pill-g{background:var(--gbg);color:var(--green)}
.pill-y{background:var(--ybg);color:var(--ytext)}
.pill-r{background:var(--rbg);color:var(--rtext)}
.pill-gray{background:var(--s2);color:var(--t3)}
.pkg{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;white-space:nowrap;border:1px solid transparent}
.pkg-none{background:var(--s2);color:var(--t3);border-color:var(--border)}
.pkg-core{background:var(--bbg);color:var(--blue)}
.pkg-ess{background:var(--gbg);color:var(--green)}
.pkg-pro{background:var(--pbg);color:var(--purple)}
.pkg-part{background:var(--ybg);color:var(--ytext)}
.upg{font-size:12px;font-weight:600;color:var(--purple);font-family:'DM Mono',monospace}
.tags{display:flex;flex-wrap:wrap;gap:3px;max-width:200px}
.tag{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:500;white-space:nowrap}
.tag-k{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.tag-o{background:var(--s2);color:var(--t2);border:1px solid var(--border)}
.tag-m{background:var(--s2);color:var(--t3);border:1px solid var(--border);font-style:italic}
.dm-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:4px;vertical-align:middle}
.cc-sm .cc-n{font-weight:500;color:var(--text);font-size:12px}
.cc-sm .cc-t{font-size:10px;color:var(--t3);margin-top:1px}
.ren-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.ren-soon{background:var(--obg);color:var(--orange)}
.ren-future{background:var(--s2);color:var(--t3)}
.ren-closed{background:var(--s3);color:var(--t3);text-decoration:line-through}
.ren-unknown{background:var(--s2);color:var(--t3)}
.la{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace}
.ytd{font-family:'DM Mono',monospace;font-size:12px}
.web-link{font-size:10px;color:var(--blue);text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.web-link:hover{text-decoration:underline}
.empty{padding:80px;text-align:center;color:var(--t3);background:var(--surface);font-size:14px}
.mbg{display:none;position:fixed;inset:0;background:rgba(26,24,20,.55);z-index:500;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto;backdrop-filter:blur(3px)}
.mbg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:720px;margin:auto;position:relative;box-shadow:0 24px 64px rgba(0,0,0,.14)}
.mhdr{padding:22px 26px 0}
.mhdr h2{font-size:18px;font-weight:600;letter-spacing:-.3px}
.mhdr .mmeta{font-size:11px;color:var(--t3);margin-top:4px;line-height:1.6}
.mhdr .mlinks{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.mlink{font-size:11px;color:var(--blue);text-decoration:none;display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bbg);border:1px solid #bfdbfe;border-radius:5px;font-weight:500}
.mlink:hover{background:#bfdbfe}
.mlink.research{background:var(--pbg);border-color:#c4b5fd;color:var(--purple)}
.mlink.research:hover{background:#c4b5fd}
.mclose{position:absolute;top:16px;right:18px;background:var(--s2);border:1px solid var(--border);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--t2)}
.mclose:hover{background:var(--s3)}
.mtabs{display:flex;padding:14px 26px 0;border-bottom:1px solid var(--border);margin-top:14px}
.mtab{padding:9px 14px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .1s}
.mtab:hover{color:var(--text)}
.mtab.active{color:var(--text);border-bottom-color:var(--red);font-weight:600}
.mpane{display:none;padding:22px 26px 26px}
.mpane.active{display:block}
.srow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.srow2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.mstat{background:var(--s2);border-radius:8px;padding:11px 13px;border:1px solid var(--border)}
.mstat .ml{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.mstat .mv{font-size:15px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace}
.stitle{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;margin-top:18px}
.stitle:first-of-type{margin-top:0}
.renewal-banner{border-radius:8px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.renewal-banner.soon{background:var(--obg);border:1px solid #fdba74}
.renewal-banner.future{background:var(--s2);border:1px solid var(--border)}
.renewal-banner.closed{background:var(--s3);border:1px solid var(--border2)}
.renewal-banner.unknown{background:var(--s2);border:1px solid var(--border)}
.rb-icon{font-size:18px;flex-shrink:0}
.rb-title{font-size:12px;font-weight:700;color:var(--text);display:block;margin-bottom:2px}
.rb-sub{font-size:11px;color:var(--t2);line-height:1.5;display:block}
.pkg-card{background:var(--pbg);border:1px solid #c4b5fd;border-left:3px solid var(--purple);border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:7px}
.pkg-card .pn{font-size:12px;font-weight:700;color:var(--purple);margin-bottom:3px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.pkg-card .pr{font-size:11px;color:#7c3aed;line-height:1.55}
.pdelta{font-size:10px;font-weight:700;color:var(--purple);white-space:nowrap;font-family:'DM Mono',monospace}
.addon-card{background:#fffbeb;border:1px solid #fde68a;border-left:3px solid #f59e0b;border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:7px}
.addon-card.key{background:var(--bbg);border:1px solid #bfdbfe;border-left-color:var(--blue)}
.addon-card .pn{font-size:12px;font-weight:700;color:#92400e;margin-bottom:3px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.addon-card.key .pn{color:var(--blue)}
.addon-card .pr{font-size:11px;color:#78350f;line-height:1.55}
.addon-card.key .pr{color:#1e40af}
.pval{font-size:10px;font-weight:700;background:#d1fae5;color:#065f46;padding:2px 6px;border-radius:4px;white-space:nowrap;font-family:'DM Mono',monospace}
.have-list{display:flex;flex-wrap:wrap;gap:5px}
.have-tag{background:var(--gbg);color:var(--green);border:1px solid #bbf7d0;padding:2px 9px;border-radius:4px;font-size:10px;font-weight:500}
.cc-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 15px;margin-bottom:8px}
.cc-card.dm{border-color:#bbf7d0;background:#f0fdf4}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.cc-nm{font-size:14px;font-weight:600;color:var(--text)}
.cc-ti{font-size:11px;color:var(--t3);margin-top:2px}
.cc-acts{display:flex;gap:6px;flex-wrap:wrap}
.ccbtn{padding:5px 11px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--t2);text-decoration:none;display:inline-flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;transition:all .1s}
.ccbtn:hover{background:var(--s2);color:var(--text)}
.ccbtn.dark{background:var(--text);color:#fff;border-color:var(--text)}
.ccbtn.dark:hover{background:#333}
.ectl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.ectl label{font-size:11px;color:var(--t3);font-weight:500}
.esubj{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:10px 13px;margin-bottom:8px}
.esubj .elbl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.esubj .etxt{font-size:13px;font-weight:600;color:var(--text)}
.ebody{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;min-height:280px;outline:none;font-family:'DM Sans',sans-serif}
.ebody:focus{border-color:var(--border2)}
.eacts{display:flex;gap:8px;margin-top:10px}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--t2);font-family:'DM Sans',sans-serif;transition:all .1s}
.btn:hover{background:var(--s2);color:var(--text)}
.btn.dark{background:var(--text);color:#fff;border-color:var(--text)}
.btn.dark:hover{background:#333}
.btn.ok{background:var(--gbg);color:var(--green);border-color:#bbf7d0}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-l">
    <div class="logo">Brad's <em>R365</em> Dashboard</div>
    <span class="hpill">Bradley Carroll</span>
    <span class="hpill">371 accounts</span>
    <span class="hpill">2,199 contacts</span>
  </div>
  <div class="hdr-r">Synced Apr 10, 2026</div>
</div>
<div class="alert-bar" id="alertBar" style="display:none">
  <span>&#9888;</span><span id="alertText"></span>
</div>
<div class="metrics" id="metrics"></div>
<div class="toolbar">
  <div class="tabs-row">
    <button class="tab active" onclick="setTab('all',this)">All <span class="cnt" id="cnt-all">371</span></button>
    <button class="tab" onclick="setTab('soon',this)">&#9650; Closing Soon <span class="cnt" id="cnt-soon">0</span></button>
    <button class="tab" onclick="setTab('prime',this)">&#9733; Prime Targets <span class="cnt" id="cnt-prime">0</span></button>
    <button class="tab" onclick="setTab('upgrades',this)">Upgrades <span class="cnt" id="cnt-upgrades">0</span></button>
    <button class="tab" onclick="setTab('green',this)">Green Risk <span class="cnt" id="cnt-green">0</span></button>
    <button class="tab" onclick="setTab('atrisk',this)">At-Risk <span class="cnt" id="cnt-atrisk">0</span></button>
  </div>
  <div class="tsep"></div>
  <div class="tcontrols">
    <input class="ctrl" type="text" id="search" placeholder="Search account or city..." oninput="render()"/>
    <select class="ctrl" id="sort" onchange="render()">
      <option value="renewal">Sort: Renewal Date</option>
      <option value="ws">Sort: Whitespace $</option>
      <option value="ytd">Sort: YTD Revenue</option>
      <option value="upgrade">Sort: Upgrade $</option>
      <option value="mc">Sort: Missing Products</option>
    </select>
    <select class="ctrl" id="stF" onchange="render()"><option value="">All States</option></select>
    <select class="ctrl" id="pkF" onchange="render()">
      <option value="">Any Package</option>
      <option value="core">Core Accounting</option>
      <option value="ea">Essential Accounting</option>
      <option value="pa">Professional Accounting</option>
      <option value="eo">Essential Operations</option>
      <option value="po">Professional Operations</option>
      <option value="none">No Accounting</option>
    </select>
  </div>
</div>
<div class="twrap">
  <table>
    <thead>
      <tr>
        <th>Account</th>
        <th>Risk</th>
        <th>Renewal</th>
        <th>Window</th>
        <th>Accounting</th>
        <th>Operations</th>
        <th>Upgrade $/mo</th>
        <th>Top Pitches</th>
        <th>Primary Contact</th>
        <th>YTD Rev</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" class="empty" style="display:none">No accounts match your filters.</div>
</div>
<div class="mbg" id="modal" onclick="bgClose(event)">
  <div class="modal">
    <button class="mclose" onclick="closeModal()">&#x2715;</button>
    <div id="mbody"></div>
  </div>
</div>

ted Purchase Orders with EDI, and Intraday Sales and Labor Polling — which gives managers live labor data throughout the shift so they can adjust hours in real time.\n\nWith {loc} location{locs}, labor control at that granularity makes a measurable difference. 15 minutes?\n\nBest,\nBradley Carroll\nAccount Executive | Restaurant365"}, "default": {"subject": "Expanding Your R365 Platform | {account}", "body": "Hi {first},\n\nHope things are going well at {account}! I was reviewing your account and wanted to connect about a few features that could add real value based on how you're currently using R365.\n\nGiven your {loc} location{locs} and what your team is already doing on the platform, I think there are some quick wins worth walking through together.\n\nWould you have 15 minutes this week?\n\nBest,\nBradley Carroll\nAccount Executive | Restaurant365"}};

function setTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function fmt(n){if(!n)return '$0';if(n>=1000000)return '$'+(n/1000000).toFixed(1)+'M';if(n>=1000)return '$'+Math.round(n/1000)+'K';return '$'+Math.round(n).toLocaleString();}
function upgT(r){let t=0;(r.acct_upgrades||[]).forEach(u=>t+=u.total);(r.ops_upgrades||[]).forEach(u=>t+=u.total);return t;}
function pkgCls(p){if(!p||p==='None')return 'pkg-none';if(p.includes('Professional'))return 'pkg-pro';if(p.includes('Essential'))return 'pkg-ess';if(p.includes('Core'))return 'pkg-core';return 'pkg-part';}
function pkgL(p){if(!p||p==='None')return 'None';return p.split(' (')[0];}
function rCls(r){return r==='Green'?'pill-g':r==='Yellow'?'pill-y':r==='Red'?'pill-r':'pill-gray';}
function winLabel(r){
  if(r.urgency==='soon')return '<span class="ren-badge ren-soon">&#9650; '+r.dtd+'d left</span>';
  if(r.urgency==='closed')return '<span class="ren-badge ren-closed">Window closed</span>';
  if(r.urgency==='future')return '<span class="ren-badge ren-future">'+r.dtd+'d away</span>';
  if(r.urgency==='past')return '<span class="ren-badge ren-closed">Renewed</span>';
  return '<span class="ren-badge ren-unknown">&#8212;</span>';
}
function filterSort(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const st=document.getElementById('stF').value;
  const pk=document.getElementById('pkF').value;
  const so=document.getElementById('sort').value;
  let d=DATA;
  if(tab==='soon')d=d.filter(x=>x.urgency==='soon');
  else if(tab==='prime')d=d.filter(x=>x.risk==='Green'&&x.ws>2000&&x.ytd>1000000);
  else if(tab==='upgrades')d=d.filter(x=>(x.acct_upgrades&&x.acct_upgrades.length)||(x.ops_upgrades&&x.ops_upgrades.length));
  else if(tab==='green')d=d.filter(x=>x.risk==='Green');
  else if(tab==='atrisk')d=d.filter(x=>x.risk==='Red'||x.risk==='Yellow');
  if(q)d=d.filter(x=>x.n.toLowerCase().includes(q)||(x.ci||'').toLowerCase().includes(q));
  if(st)d=d.filter(x=>x.st===st);
  if(pk==='core')d=d.filter(x=>x.acct_pkg&&x.acct_pkg.includes('Core'));
  else if(pk==='ea')d=d.filter(x=>x.acct_pkg&&x.acct_pkg.includes('Essential Accounting'));
  else if(pk==='pa')d=d.filter(x=>x.acct_pkg&&x.acct_pkg.includes('Professional Accounting'));
  else if(pk==='eo')d=d.filter(x=>x.ops_pkg&&x.ops_pkg.includes('Essential Operations'));
  else if(pk==='po')d=d.filter(x=>x.ops_pkg&&x.ops_pkg.includes('Professional Operations'));
  else if(pk==='none')d=d.filter(x=>!x.acct_pkg||x.acct_pkg==='None');
  return [...d].sort((a,b)=>{
    if(so==='renewal'){const ao=a.urgency==='soon'?0:a.urgency==='future'?1:2,bo=b.urgency==='soon'?0:b.urgency==='future'?1:2;if(ao!==bo)return ao-bo;return(a.dtd??9999)-(b.dtd??9999);}
    if(so==='ws')return b.ws-a.ws;
    if(so==='ytd')return b.ytd-a.ytd;
    if(so==='upgrade')return upgT(b)-upgT(a);
    if(so==='mc')return b.mc-a.mc;
    return 0;
  });
}

      +'<td><span class="pill '+rCls(r.risk)+'">'+r.risk+'</span></td>'
      +'<td><span class="la">'+(r.renewal||'&#8212;')+'</span></td>'
      +'<td>'+winLabel(r)+'</td>'
      +'<td><span class="pkg '+pkgCls(r.acct_pkg)+'">'+pkgL(r.acct_pkg)+'</span></td>'
      +'<td><span class="pkg '+pkgCls(r.ops_pkg)+'">'+pkgL(r.ops_pkg)+'</span></td>'
      +'<td>'+(upg?'<span class="upg">+'+fmt(upg)+'</span>':'<span style="color:var(--t3)">&#8212;</span>')+'</td>'
      +'<td><div class="tags">'+tags+'</div></td>'
      +'<td>'+ccCell+'</td>'
      +'<td><span class="ytd">'+fmt(r.ytd)+'</span></td>'
      +'</tr>';
  }).join('');
}
function updateCounts(){
  document.getElementById('cnt-all').textContent=DATA.length;
  document.getElementById('cnt-soon').textContent=DATA.filter(x=>x.urgency==='soon').length;
  document.getElementById('cnt-prime').textContent=DATA.filter(x=>x.risk==='Green'&&x.ws>2000&&x.ytd>1000000).length;
  document.getElementById('cnt-upgrades').textContent=DATA.filter(x=>(x.acct_upgrades&&x.acct_upgrades.length)||(x.ops_upgrades&&x.ops_upgrades.length)).length;
  document.getElementById('cnt-green').textContent=DATA.filter(x=>x.risk==='Green').length;
  document.getElementById('cnt-atrisk').textContent=DATA.filter(x=>x.risk==='Red'||x.risk==='Yellow').length;
}
function openModal(i){
  const r=rows[i];
  const upg=upgT(r);
  const contacts=CONTACTS[r.n]||[];
  const allKnown=['Alliance Payroll','Task Management','ExpandShare','R365 Hire','Intelligence','Tip Automation','Custom Financial Reporting','Fixed Assets','Intraday Polling','Smart Labor','Accounting','Inventory & Purchasing','Recipe Costing','Scheduling','Manager Log'];
  const haveList=allKnown.filter(p=>!(r.missing||{})[p]);
  const missing=Object.entries(r.missing||{}).sort((a,b)=>b[1]-a[1]);
  const renMsg={
    soon:'<span class="rb-title">&#9650; Window closing &#8212; '+r.dtd+' days until renewal</span><span class="rb-sub">Renewal: <strong>'+r.renewal+'</strong>. You have until then to get upsell changes signed. Get in front of them now.</span>',
    future:'<span class="rb-title">&#128197; Renews '+r.renewal+'</span><span class="rb-sub">'+r.dtd+' days away. Keep on radar and target ~90 days out.</span>',
    closed:'<span class="rb-title">Window closed this cycle</span><span class="rb-sub">Renewal on '+r.renewal+' is within 60 days &#8212; too late to make changes this cycle. Will auto-renew. Target next cycle.</span>',
    past:'<span class="rb-title">Already renewed</span><span class="rb-sub">Contract renewed. Start planning the upsell conversation for their next cycle.</span>',
    unknown:'<span class="rb-title">No renewal date on file</span><span class="rb-sub">Add the contract date to your next Salesforce export.</span>',
  };
  const renCls={soon:'soon',future:'future',closed:'closed',past:'closed',unknown:'unknown'};
  const upgCards=[(r.acct_upgrades||[]).map(u=>'<div class="pkg-card"><div class="pn">&#8679; Upgrade to '+u.to+'<span class="pdelta">+$'+u.delta_per_loc+'/loc &times;'+r.loc+' = +$'+u.total+'/mo</span></div><div class="pr">'+(PITCH[u.to]||'Unlocks key capabilities.')+'</div></div>'),(r.ops_upgrades||[]).map(u=>'<div class="pkg-card"><div class="pn">&#8679; Upgrade to '+u.to+'<span class="pdelta">+$'+u.delta_per_loc+'/loc &times;'+r.loc+' = +$'+u.total+'/mo</span></div><div class="pr">'+(PITCH[u.to]||'Unlocks key capabilities.')+'</div></div>')].flat().join('');
  const addCards=missing.map(([p,v])=>'<div class="addon-card'+(KEY.includes(p)?' key':'')+'"><div class="pn">'+(KEY.includes(p)?'&#9733; ':'')+p+'<span class="pval">+$'+v.toLocaleString()+'/yr</span></div><div class="pr">'+(PITCH[p]||'Strong fit for this account.')+'</div></div>').join('');
  const ccCards=contacts.length?contacts.map((c,ci)=>{
    const ph=c.p&&c.p!=='nan'?'<a class="ccbtn" href="tel:'+c.p+'">&#9742; '+c.p+'</a>':'';
    const em=c.e&&c.e!=='nan'?'<a class="ccbtn" href="mailto:'+c.e+'">&#9993; '+c.e+'</a>':'';
    const dr='<button class="ccbtn dark" onclick="loadDraft('+i+','+ci+')">&#9997; Draft Email</button>';
    return '<div class="cc-card'+(c.dm?' dm':'')+'"><div class="cc-top"><div><div class="cc-nm">'+(c.dm?'<span class="dm-dot"></span>':'')+c.n+'</div><div class="cc-ti">'+c.t+'</div></div>'+(c.dm?'<span class="pill pill-g" style="font-size:9px">Decision Maker</span>':'')+'</div><div class="cc-acts">'+ph+em+dr+'</div></div>';
  }).join(''):'<p style="color:var(--t3);font-size:12px;padding:20px 0">No contacts on record.</p>';
  const prodOpts=missing.map(([p])=>'<option value="'+p+'">'+p+'</option>').join('')+'<option value="default">General Upsell</option>';
  const ccOpts=contacts.map((c,ci)=>'<option value="'+ci+'">'+c.n+' &#8212; '+c.t+'</option>').join('');
  
  // Website and research links
  const webLink=r.website?'<a class="mlink" href="'+r.website+'" target="_blank" rel="noopener">&#127760; Visit Website</a>':'';
  const researchQ=encodeURIComponent(r.n+' restaurant locations news');
  const researchLink='<a class="mlink research" href="https://www.google.com/search?q='+researchQ+'" target="_blank" rel="noopener">&#128270; Research Account</a>';
  const linkedinQ=encodeURIComponent(r.n+' restaurant');
  const linkedinLink='<a class="mlink research" href="https://www.linkedin.com/search/results/companies/?keywords='+linkedinQ+'" target="_blank" rel="noopener">&#128101; LinkedIn</a>';

  document.getElementById('mbody').innerHTML=
    '<div class="mhdr"><h2>'+r.n+'</h2>'
    +'<div class="mmeta">'+r.ci+', '+r.st+' &middot; '+r.loc+' location'+(r.loc>1?'s':'')+' &middot; since '+r.cs+' &middot; POS: '+r.pos+'</div>'
    +'<div class="mlinks">'+webLink+researchLink+linkedinLink+'</div>'
    +'</div>'
    +'<div class="mtabs"><button class="mtab active" id="mt-p" onclick="mTab('p')">Pitch Strategy</button><button class="mtab" id="mt-c" onclick="mTab('c')">Contacts ('+contacts.length+')</button><button class="mtab" id="mt-e" onclick="mTab('e')">Email Templates</button></div>'
    +'<div class="mpane active" id="mp-p">'
      +'<div class="renewal-banner '+(renCls[r.urgency]||'unknown')+'"><div class="rb-icon">'+(r.urgency==='soon'?'&#9650;':r.urgency==='closed'?'&#128274;':r.urgency==='future'?'&#128197;':'&#10067;')+'</div><div>'+(renMsg[r.urgency]||renMsg.unknown)+'</div></div>'
      +'<div class="srow"><div class="mstat"><div class="ml">Whitespace</div><div class="mv" style="color:var(--red)">$'+r.ws.toLocaleString()+'</div></div><div class="mstat"><div class="ml">YTD Revenue</div><div class="mv">'+fmt(r.ytd)+'</div></div><div class="mstat"><div class="ml">Risk Level</div><div class="mv"><span class="pill '+rCls(r.risk)+'">'+r.risk+'</span></div></div><div class="mstat"><div class="ml">Upgrade Potential</div><div class="mv" style="color:var(--purple)">'+(upg?'+'+fmt(upg)+'/mo':'&#8212;')+'</div></div></div>'
      +'<div class="srow2"><div class="mstat"><div class="ml">Accounting Package</div><div class="mv" style="font-size:13px"><span class="pkg '+pkgCls(r.acct_pkg)+'">'+pkgL(r.acct_pkg)+'</span></div></div><div class="mstat"><div class="ml">Operations Package</div><div class="mv" style="font-size:13px"><span class="pkg '+pkgCls(r.ops_pkg)+'">'+pkgL(r.ops_pkg)+'</span></div></div></div>'
      +(upgCards?'<div class="stitle">Package upgrade opportunities</div>'+upgCards:'')
      +(addCards?'<div class="stitle">Add-on products to pitch</div>'+addCards:'')
      +'<div class="stitle">Already has</div><div class="have-list">'+haveList.map(p=>'<span class="have-tag">'+p+'</span>').join('')+'</div>'
      +'<div style="margin-top:14px"><span class="la">Last activity: '+(r.la||'&#8212;')+'</span></div>'
    +'</div>'
    +'<div class="mpane" id="mp-c">'+ccCards+'</div>'
    +'<div class="mpane" id="mp-e">'
      +'<div class="ectl">'+(contacts.length?'<label>Contact:</label><select class="ctrl" id="em-cc">'+ccOpts+'</select>':'')+'<label>Template:</label><select class="ctrl" id="em-pr">'+prodOpts+'</select><button class="btn dark" onclick="applyTmpl('+i+',null)">Load Template</button></div>'
      +'<div class="esubj"><div class="elbl">Subject</div><div class="etxt" id="em-s">Select a template and click Load.</div></div>'
      +'<div class="ebody" id="em-b" contenteditable="true"></div>'
      +'<div class="eacts"><button class="btn" id="bs" onclick="copyS()">Copy Subject</button><button class="btn" id="bb" onclick="copyB()">Copy Body</button></div>'
    +'</div>';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>applyTmpl(i,null),40);
}
function mTab(t){document.querySelectorAll('.mtab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.mpane').forEach(x=>x.classList.remove('active'));document.getElementById('mt-'+t).classList.add('active');document.getElementById('mp-'+t).classList.add('active');}
function applyTmpl(ri,ci){
  const r=rows[ri];if(!r)return;
  const cs=CONTACTS[r.n]||[];
  const csel=document.getElementById('em-cc');
  const cIdx=ci!==null?ci:(csel?parseInt(csel.value)||0:0);
  const c=cs[cIdx]||{n:'Team'};
  const first=c.n?c.n.split(' ')[0]:'Team';
  const psel=document.getElementById('em-pr');
  const prod=psel?psel.value:Object.keys(r.missing||{})[0]||'default';
  const tmpl=TEMPLATES[prod]||TEMPLATES['default'];
  const locs=r.loc>1?'s':'';
  const fill=s=>s.replace(/{account}/g,r.n).replace(/{first}/g,first).replace(/{loc}/g,r.loc).replace(/{locs}/g,locs).replace(/{ytd}/g,r.ytd.toLocaleString());
  const se=document.getElementById('em-s'),be=document.getElementById('em-b');
  if(se)se.textContent=fill(tmpl.subject);
  if(be)be.textContent=fill(tmpl.body);
}
function loadDraft(ri,ci){mTab('e');setTimeout(()=>{const s=document.getElementById('em-cc');if(s)s.value=ci;applyTmpl(ri,ci);},50);}
function copyS(){const e=document.getElementById('em-s');if(!e)return;navigator.clipboard.writeText(e.textContent).then(()=>{const b=document.getElementById('bs');b.textContent='Copied!';b.classList.add('ok');setTimeout(()=>{b.textContent='Copy Subject';b.classList.remove('ok');},2000);});}
function copyB(){const e=document.getElementById('em-b');if(!e)return;navigator.clipboard.writeText(e.textContent||e.innerText).then(()=>{const b=document.getElementById('bb');b.textContent='Copied!';b.classList.add('ok');setTimeout(()=>{b.textContent='Copy Body';b.classList.remove('ok');},2000);});}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function bgClose(e){if(e.target.id==='modal')closeModal();}
function initMetrics(){
  const total=DATA.length,ws=DATA.reduce((s,x)=>s+x.ws,0);
  const soon=DATA.filter(x=>x.urgency==='soon').length;
  const prime=DATA.filter(x=>x.risk==='Green'&&x.ws>2000&&x.ytd>1000000).length;
  const upg=DATA.filter(x=>(x.acct_upgrades&&x.acct_upgrades.length)||(x.ops_upgrades&&x.ops_upgrades.length)).length;
  const soonAccts=DATA.filter(x=>x.urgency==='soon').sort((a,b)=>(a.dtd??999)-(b.dtd??999));
  const alertBar=document.getElementById('alertBar');
  if(soonAccts.length){alertBar.style.display='flex';const names=soonAccts.slice(0,3).map(x=>x.n).join(', ');const extra=soonAccts.length>3?' and '+(soonAccts.length-3)+' more':'';document.getElementById('alertText').innerHTML='<strong>'+soonAccts.length+' renewal windows closing in 60-90 days</strong> &#8212; '+names+(extra?', '+extra:'')+'.';}
  document.getElementById('metrics').innerHTML=
    '<div class="metric"><div class="lbl">Accounts</div><div class="val">'+total+'</div><div class="sub">in book of business</div></div>'
    +'<div class="metric"><div class="lbl">Total Whitespace</div><div class="val red">$'+(ws/1000000).toFixed(2)+'M</div><div class="sub">upsell opportunity</div></div>'
    +'<div class="metric"><div class="lbl">Closing Soon</div><div class="val amber">'+soon+'</div><div class="sub">window open 60-90 days</div></div>'
    +'<div class="metric"><div class="lbl">Prime Targets</div><div class="val">'+prime+'</div><div class="sub">green + high value + high WS</div></div>'
    +'<div class="metric"><div class="lbl">Package Upgrades</div><div class="val">'+upg+'</div><div class="sub">have an upgrade path</div></div>';
}
function initFilters(){const states=[...new Set(DATA.map(x=>x.st).filter(Boolean))].sort();const sel=document.getElementById('stF');states.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});}
initMetrics();initFilters();render();
</script>
